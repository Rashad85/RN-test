<!doctype html><html lang="az"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>ÜSİ -2</title><style>:root{--wine:#74182d;--ink:#172033;--soft:#f5f6f8;--line:#e0e4ea}*{box-sizing:border-box}body{margin:0;font-family:Inter,Segoe UI,Arial,sans-serif;background:#f2f4f7;color:var(--ink)}button,input{font:inherit}.student-shell{min-height:100vh;display:grid;grid-template-columns:270px minmax(0,1fr)}.student-side{background:linear-gradient(180deg,#4b0e20,#74182d);color:white;padding:26px 22px;position:sticky;top:0;height:100vh}.student-logo{width:58px;height:58px;border-radius:18px;background:white;color:var(--wine);display:grid;place-items:center;font-weight:900;font-size:22px}.student-side h2{margin:18px 0 6px}.student-side p{opacity:.78}.timer{margin-top:22px;padding:15px;border-radius:14px;background:#ffffff12;font-size:28px;font-weight:800}.progress{height:8px;background:#ffffff25;border-radius:99px;overflow:hidden;margin-top:12px}.progress i{display:block;height:100%;background:#fff;width:0}.student-main{padding:28px;max-width:1050px;width:100%;margin:auto}.intro,.question-card,.result-card{background:white;border:1px solid var(--line);border-radius:18px;box-shadow:0 12px 35px #26324810}.intro{padding:26px}.intro h1{margin:0 0 8px;font-size:30px}.meta{display:flex;gap:10px;flex-wrap:wrap}.pill{padding:7px 10px;border-radius:999px;background:#f2e7eb;color:var(--wine);font-size:13px;font-weight:700}.question-card{padding:22px;margin-top:16px;break-inside:avoid}.question-card small{display:block;color:#7b8494;margin-bottom:6px}.q-instruction{font-weight:800;color:var(--wine);line-height:1.45;margin:2px 0 7px}.q-stem{font-weight:650;font-size:1.04rem;line-height:1.5;margin:0 0 12px;white-space:pre-wrap}.option{display:grid;grid-template-columns:24px 1fr;gap:10px;align-items:start;padding:12px;border:1px solid var(--line);border-radius:12px;margin-top:9px;cursor:pointer;line-height:1.4}.option:hover{border-color:#b98b9 ype":"Multiple Choice","text":"Choose the correct variant. The man ... I wanted to meet was on holiday.","A":"what","B":"whom","C":"whose","D":"which","E":"who","answer":"B"},{"topic":"3. Was modern equipment brought to your warehouse?","difficulty":"","grade":"","type":"","text":"","A":"","B":"","C":"","D":"","E":"","answer":""},{"topic":"Pronouns — Personal/Possessive/Reflexive/Demonstrative","difficulty":"Orta","grade":"Qarışıq","type":"Multiple Choice","text":"Choose the correct variant. I saw ... in the mirror and noticed my tie was wrong.","A":"mine","B":"me","C":"I","D":"myself","E":"my","answer":"D"},{"topic":"Passive Voice — Interrogative","difficulty":"Orta","grade":"Qarışıq","type":"Multiple Choice","text":"Change the sentence into the Passive Voice. Did the audience listen to the speech with interest?","A":"Is the speech listened to with interest?","B":"Was the speech being listened to with interest?","C":"Has the speech been listened to with interest?","D":"Was the speech listened to with interest?","E":"Was the speech been listened to with interest?","answer":"D"},{"topic":"4. Are trainees at primary workshop required to wear uniforms?","difficulty":"","grade":"","type":"","text":"","A":"","B":"","C":"","D":"","E":"","answer":""},{"topic":"Adjective","difficulty":"Orta","grade":"Qarışıq","type":"Multiple Choice","text":"Choose the correct variant. This coat is ... than the one you bought last week.","A":"nicer","B":"the most nice","C":"nicest","D":"more nicer","E":"most nicest","answer":"A"},{"topic":"Adjective","difficulty":"Orta","grade":"Qarışıq","type":"Multiple Choice","text":"Choose the correct variant. Leyla’s aunt was not as ... as her uncle.","A":"more older","B":"older","C":"the oldest","D":"old","E":"the most old","answer":"D"},{"topic":"Passive Voice — Can/Cannot Change","difficulty":"Orta","grade":"Qarışıq","type":"Multiple Choice","text":"We were far from home and felt unhappy.","A":"","B":"","C":"","D":"","E":"","answer":""},{"topic":"Adjective","difficulty":"Orta","grade":"Qarışıq","type":"Multiple Choice","text":"Choose the correct variant. This street is not so ... as that one.","A":"wide","B":"wider","C":"more wide","D":"most wide","E":"widest","answer":"A"},{"topic":"Noun — Cases / Possessive Case","difficulty":"Çətin","grade":"Qarışıq","type":"Multiple Choice","text":"Choose the sentences with the noun in the Possessive Case. 1. Sarah's answer was short but convincing. 2. Sarah's answered all the emails. 3. Mrs Collins's visit was unexpected. 4. Mrs Collins's visited the old school. 5. They were surprised at Mrs Collins's visit.","A":"1, 3, 5","B":"2, 4","C":"1, 2","D":"3, 4, 5","E":"2, 3","answer":"A"},{"topic":"Passive Voice — Interrogative","difficulty":"Orta","grade":"Qarışıq","type":"Multiple Choice","text":"Choose the correct sentence in the Passive Voice. Who wrote the list of new words?","A":"Who was the list of new words been written by?","B":"Who the list of new words was written by?","C":"Who wrote the list of new words by?","D":"By whom the list of new words was written?","E":"Who was the list of new words written by?","answer":"E"},{"topic":"Passive Voice — Sentence Selection","difficulty":"Orta","grade":"Qarışıq","type":"Multiple Choice","text":"Was the boy rewarded by the trainer?","A":"","B":"","C":"","D":"","E":"","answer":""},{"topic":"Passive Voice — Interrogative","difficulty":"Orta","grade":"Qarışıq","type":"Multiple Choice","text":"Choose the correct variant in the Passive Voice. Why didn't they invite her?","A":"Why wasn't she been invited?","B":"Why wasn't she invited?","C":"Why she hasn't been invited?","D":"Why isn't she invited?","E":"Why hadn't she been invited?","answer":"B"},{"topic":"Conjunctive Words","difficulty":"Orta","grade":"Qarışıq","type":"Multiple Choice","text":"Choose the correct conjunctive word. Nigar couldn't remember ... she had left her notebook.","A":"which","B":"where","C":"whom","D":"who","E":"whose","answer":"B"},{"topic":"Article","difficulty":"Orta","grade":"Qarışıq","type":"Multiple Choice","text":"Choose the correct variant. He went on ... unforgettable trip to ... distant island.","A":"an, a","B":"the, the","C":"the, a","D":"–, –","E":"a, the","answer":"A"},{"topic":"Modal Verbs — Correct Modal","difficulty":"Orta","grade":"Qarışıq","type":"Multiple Choice","text":"The children ... make noise because their baby brother was sleeping.","A":"didn't have to","B":"weren't able to","C":"were able","D":"haven't","E":"had to","answer":"B"},{"topic":"Pronouns — Personal/Possessive/Reflexive/Demonstrative","difficulty":"Orta","grade":"Qarışıq","type":"Multiple Choice","text":"Choose the correct variant. We enjoyed ... at the school concert yesterday.","A":"our","B":"us","C":"we","D":"ours","E":"ourselves","answer":"E"},{"topic":"Conjunctive Words","difficulty":"Orta","grade":"Qarışıq","type":"Multiple Choice","text":"Choose the correct conjunctive word. We found a café ... we could have lunch.","A":"where","B":"whose","C":"whom","D":"who","E":"which","answer":"A"},{"topic":"3. Were the certificates transported by post official?","difficulty":"","grade":"","type":"","text":"","A":"","B":"","C":"","D":"","E":"","answer":""}],"shortCode":"D4HMNU","publicUrl":"https://rashad85.github.io/RN-test/e/D4HMNU/","publishedAt":"2026-07-14 15:54:50"};const BRAND={"teacher":"Rashad Nasibov","brand":"RN"};(function studentApp(E,B){const root=document.getElementById('studentApp')||document.body;let seconds=(E.duration||45)*60;root.innerHTML=`<div class="wm">${B.brand} • ${B.teacher}</div><div class="student-shell"><aside class="student-side"><div class="student-logo">${B.brand}</div><h2>${B.teacher}</h2><p>${E.name}</p><div class="timer" id="timer">--:--</div><div class="progress"><i id="bar"></i></div><div class="palette" id="palette"></div></aside><main class="student-main"><section class="intro"><h1>${E.name}</h1><p>${E.instruction||'Hər sual üçün bir cavab seçin.'}</p><div class="meta"><span class="pill">${E.questions.length} sual</span><span class="pill">${E.duration||45} dəqiqə</span></div><div style="margin-top:18px"><input id="studentName" placeholder="Ad və soyad" style="width:100%;padding:13px;border:1px solid #d9dde4;border-radius:12px"></div></section><div id="questions"></div><button class="finish" id="finishBtn">Sınağı bitir</button><div id="result"></div></main></div>`;const letters=['A','B','C','D','E'];questions.innerHTML=E.questions.map((q,i)=>{const p=questionParts(q);return `<section class="question-card" id="q${i}"><small>${q.topic||''}</small>${p.instruction?`<div class="q-instruction">${i+1}. ${esc(p.instruction)}</div>`:`<div class="q-instruction">${i+1}.</div>`}${p.stem?`<div class="q-stem">${esc(p.stem)}</div>`:'<div class="q-warning">Sual mətni daxil edilməyib</div>'}${letters.filter(k=>q[k]&&q[k]!=='—').map(k=>`<label class="option"><input type="radio" name="q${i}" value="${k}"><b>${k})</b><span>${esc(q[k])}</span></label>`).join('')}</section>`}).join('');palette.innerHTML=E.questions.map((_,i)=>`<span id="p${i}">${i+1}</span>`).join('');document.querySelectorAll('input[type=radio]').forEach(x=>x.addEventListener('change',()=>{const i=x.name.slice(1);document.getElementById('p'+i)?.classList.add('done');update()}));function update(){const done=document.querySelectorAll('input[type=radio]:checked').length;bar.style.width=(done/E.questions.length*100)+'%'}function tick(){const m=Math.floor(seconds/60),ss=seconds%60;timer.textContent=String(m).padStart(2,'0')+':'+String(ss).padStart(2,'0');if(seconds--<=0)finish()}const int=setInterval(tick,1000);tick();finishBtn.onclick=finish;function finish(){clearInterval(int);let score=0,graded=0,blank=0;E.questions.forEach((q,i)=>{const a=document.querySelector(`input[name=q${i}]:checked`);if(!a)blank++;if(q.answer){graded++;if(a&&a.value===q.answer)score++}});const percent=graded?Math.round(score/graded*100):0;result.innerHTML=`<div class="result-card"><div class="score">${percent}%</div><h2>${score} / ${graded}</h2><p>Cavabsız: ${blank}</p><p>${studentName.value||'Şagird'}</p><button class="finish" onclick="location.reload()">Yenidən başla</button></div>`;result.scrollIntoView({behavior:'smooth'});localStorage.setItem('rn_result_'+Date.now(),JSON.stringify({name:studentName.value,exam:E.name,score,total:graded,percent,date:new Date().toISOString()}))}})(EXAM,BRAND);</script></body></html>
