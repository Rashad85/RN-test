  questions.innerHTML=E.questions.map((q,i)=>{
    const p=questionParts(q);
    return `<section class="question-card" id="q${i}"><small>${q.topic||''}</small>${p.instruction?`<div class="q-instruction">${i+1}. ${esc(p.instruction)}</div>`:`<div class="q-instruction">${i+1}.</div>`}${p.stem?`<div class="q-stem">${esc(p.stem)}</div>`:''}${letters.filter(k=>q[k]&&q[k]!=='—').map(k=>`<label class="option"><input type="radio" name="q${i}" value="${k}"><span class="option-letter">${k}</span><span class="option-text">${esc(q[k])}</span></label>`).join('')}</section>`
  }).join('');
  palette.innerHTML=E.questions.map((_,i)=>`<span id="p${i}">${i+1}</span>`).join('');
  document.querySelectorAll('input[type=radio]').forEach(x=>x.addEventListener('change',()=>{
    const i=x.name.slice(1);document.getElementById('p'+i)?.classList.add('done');update()
  }))
}
function update(){
  const done=document.querySelectorAll('input[type=radio]:checked').length;
  bar.style.width=(done/E.questions.length*100)+'%'
}
function tick(){
  const m=Math.floor(seconds/60),ss=seconds%60;
  timer.textContent=String(m).padStart(2,'0')+':'+String(ss).padStart(2,'0');
  if(seconds--<=0)finish()
}
async function submitResult(payload){
  const cfg=B.supabase||{};
  try{
    const res=await fetch(cfg.url.replace(/\/+$/,'')+'/rest/v1/exam_results',{
      method:'POST',
      headers:{apikey:cfg.key,Authorization:'Bearer '+cfg.key,'Content-Type':'application/json',Prefer:'return=minimal'},
      body:JSON.stringify(payload)
    });
    if(!res.ok){
      let msg=await res.text();
      try{const j=JSON.parse(msg);msg=j.message||j.details||msg}catch{}
      if(res.status===409||/duplicate key|unique constraint|23505/i.test(msg))msg='Bu şagird bu sınağı artıq işləyib.';
      throw new Error(msg)
    }
    return {saved:true,message:'Nəticə müəllim panelinə göndərildi.'}
  }catch(err){return {saved:false,message:'Nəticə göndərilmədi: '+err.message}}
}
function performanceText(percent){
  if(percent>=90)return 'Əla nəticə';
  if(percent>=75)return 'Yaxşı nəticə';
  if(percent>=50)return 'Kafi nəticə';
  return 'Təkmilləşdirmə lazımdır'
}
function compactAnswers(details,field){
  return details.map(d=>`<span class="${d.status}"><b>${d.number}</b>${esc(d[field]||'—')}</span>`).join('')
}
function reportCardHTML(data){
  return `<article class="report-card" id="reportCard"><div class="report-watermark">${esc(B.brand)} • ${esc(B.teacher)}</div><header><div class="report-logo">${esc(B.brand)}</div><div><small>RN TEST SİSTEMİ</small><h2>NƏTİCƏ KARNESİ</h2></div></header><div class="report-name">${esc(data.name)}</div><div class="report-exam">${esc(E.name)}${data.grade?' • '+esc(data.grade):''}</div><div class="report-score"><b>${data.percent}%</b><span>${performanceText(data.percent)}</span></div><div class="report-grid"><div><span>Düzgün</span><b>${data.score}</b></div><div><span>Səhv</span><b>${data.wrong}</b></div><div><span>Boş</span><b>${data.blank}</b></div><div><span>Vaxt</span><b>${Math.floor(data.elapsed/60)}:${String(data.elapsed%60).padStart(2,'0')}</b></div></div><div class="answer-sheet"><h3>Şagirdin cavabları</h3><div class="answer-line">${compactAnswers(data.details,'selected')}</div><h3>Cavab açarı</h3><div class="answer-line key-line">${compactAnswers(data.details,'correct')}</div></div><footer><span>Müəllim: <b>${esc(B.teacher)}</b></span><span>${new Date().toLocaleDateString('az-AZ')}</span></footer></article>`
}
function printReportCard(){
  const card=document.getElementById('reportCard');if(!card)return;
  const style=document.querySelector('style')?.textContent||'';
  const w=window.open('','_blank');
  w.document.write(`<!doctype html><html><head><meta charset="utf-8"><title>Nəticə karnesi</title><style>${style}@page{size:A4;margin:12mm}body{background:#fff}.report-card{box-shadow:none;margin:0}.report-actions,.review-title,.review-card,.save-ok,.save-warn{display:none!important}</style></head><body>${card.outerHTML}<script>onload=()=>setTimeout(()=>print(),300)<\/script></body></html>`);
  w.document.close()
}
window.printRNReportCard=printReportCard;

async function finish(){
  if(finished)return;
  finished=true;if(int)clearInterval(int);finishBtn.disabled=true;
  let score=0,graded=0,blank=0,wrong=0;
  const details=E.questions.map((q,i)=>{
    const selected=document.querySelector(`input[name=q${i}]:checked`)?.value||'';
    const correct=q.answer||'';
    let status='ungraded';
    if(correct){
      graded++;
      if(!selected){blank++;status='blank'}
      else if(selected===correct){score++;status='correct'}
      else{wrong++;status='wrong'}
    }
    const p=questionParts(q);
    return {number:i+1,instruction:p.instruction,question:p.stem,selected,correct,status,
      options:Object.fromEntries(letters.filter(k=>q[k]&&q[k]!=='—').map(k=>[k,q[k]]))}
  });
  const percent=graded?Math.round(score/graded*100):0;
  const elapsed=Math.max(0,Math.round((Date.now()-startedAt)/1000));
  const payload={owner_id:B.supabase.ownerId,exam_code:E.shortCode||E.id||'exam',exam_name:E.name,
    student_name:studentIdentity.name,student_key:studentIdentity.key,student_group:studentIdentity.grade||'',score,total:graded,percent,
    correct_count:score,wrong_count:wrong,blank_count:blank,duration_seconds:elapsed,details};
  const saveState=await submitResult(payload);
  if(saveState.saved||oneAttempt)markLocalAttempt(studentIdentity.key);
  const report=reportCardHTML({name:studentIdentity.name,grade:studentIdentity.grade,percent,score,wrong,blank,elapsed,details});
  const review=details.map((d,i)=>{
    const q=E.questions[i],p=questionParts(q);
    const label=d.status==='correct'?'Düzgün':d.status==='wrong'?'Səhv':d.status==='blank'?'Boş':'Yoxlanılmır';
    return `<section class="review-card ${d.status}"><div class="review-head"><b>${d.number}. ${esc(p.instruction||'')}</b><span>${label}</span></div>${p.stem?`<div class="review-stem">${esc(p.stem)}</div>`:''}<div class="review-answer"><span>Sizin cavabınız: <b>${d.selected||'Boş'}</b></span><span>Düzgün cavab: <b>${d.correct||'—'}</b></span></div>${letters.filter(k=>q[k]&&q[k]!=='—').map(k=>`<div class="review-option ${k===d.correct?'is-correct':''} ${k===d.selected&&k!==d.correct?'is-wrong':''}"><b>${k}</b><span>${esc(q[k])}</span></div>`).join('')}</section>`
  }).join('');
  result.innerHTML=`${report}<div class="report-actions"><button class="finish" onclick="printRNReportCard()">Karne-ni çap et / PDF saxla</button></div><p class="${saveState.saved?'save-ok':'save-warn'}">${esc(saveState.message)}</p><div class="review-title"><h2>Sualların təhlili</h2></div>${review}`;
  document.querySelectorAll('input[type=radio]').forEach(x=>x.disabled=true);
  result.scrollIntoView({behavior:'smooth'});
}
})(EXAM,BRAND);</script></body></html>
