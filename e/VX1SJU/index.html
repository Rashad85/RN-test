root.innerHTML=`<div class="wm">${B.brand} • ${B.teacher}</div><div class="student-shell"><aside class="student-side"><div class="student-logo">${B.brand}</div><h2>${B.teacher}</h2><p>${E.name}</p><div class="timer" id="timer">--:--</div><div class="progress"><i id="bar"></i></div><div class="palette" id="palette"></div></aside><main class="student-main"><section class="intro" id="startPanel"><h1>${E.name}</h1><p>${E.instruction||'Hər sual üçün bir cavab seçin.'}</p><div class="meta"><span class="pill">${E.questions.length} sual</span><span class="pill">${E.duration||45} dəqiqə</span>${oneAttempt?'<span class="pill">1 cəhd</span>':''}</div><div class="identity-grid one"><input id="studentCode" placeholder="Daimi şagird kodunu daxil edin"></div><p class="identity-note">Müəllimin sizə verdiyi daimi kod bütün sınaqlarda istifadə olunur.</p><button class="finish" id="startBtn">Kodu yoxla və başla</button><div id="startStatus"></div></section><div id="examArea" hidden><div class="verified-student" id="verifiedStudent"></div><div id="questions"></div><button class="finish" id="finishBtn">Sınağı bitir</button><div id="result"></div></div></main></div>`;

function normalizeKey(v){return String(v||'').trim().toUpperCase().replace(/\s+/g,'')}
async function rpc(name,body){
  const cfg=B.supabase||{};
  if(!cfg.url||!cfg.key||!cfg.ownerId)throw new Error('Supabase bağlantısı yoxdur');
  const res=await fetch(cfg.url.replace(/\/+$/,'')+'/rest/v1/rpc/'+name,{
    method:'POST',
    headers:(()=>{const h={apikey:cfg.key,'Content-Type':'application/json'};if(cfg.headerMode==='bearer'||String(cfg.key||'').startsWith('eyJ'))h.Authorization='Bearer '+cfg.key;return h})(),
    body:JSON.stringify(body)
  });
  const text=await res.text();
  let data;try{data=text?JSON.parse(text):null}catch{data=text}
  if(!res.ok)throw new Error(data?.message||data||('HTTP '+res.status));
  return data
}
async function validateCode(key){
  const rows=await rpc('validate_student_code',{
    p_owner_id:B.supabase.ownerId,
    p_student_code:key
  });
  return Array.isArray(rows)&&rows.length?rows[0]:null
}
async function alreadyAttempted(key){
  if(!oneAttempt)return false;
  const localKey=`rn_attempt_${B.supabase?.ownerId||'local'}_${E.shortCode||E.id||'exam'}_${key}`;
  if(localStorage.getItem(localKey))return true;
  const exists=await rpc('check_exam_attempt',{
    p_owner_id:B.supabase.ownerId,
    p_exam_code:E.shortCode||E.id||'exam',
    p_student_key:key
  });
  return exists===true
}
function markLocalAttempt(key){
  const localKey=`rn_attempt_${B.supabase?.ownerId||'local'}_${E.shortCode||E.id||'exam'}_${key}`;
  localStorage.setItem(localKey,'1')
}
async function startExam(){
  const key=normalizeKey(studentCode.value);
  if(key.length<4){studentCode.focus();startStatus.innerHTML='<p class="save-warn">Daimi kodu tam yazın.</p>';return}
  startBtn.disabled=true;startBtn.textContent='Yoxlanılır...';
  try{
    const student=await validateCode(key);
    if(!student){
      startStatus.innerHTML='<div class="attempt-block"><b>Kod yanlışdır və ya aktiv deyil.</b><p>Yalnız müəllimin verdiyi daimi kodla daxil olmaq mümkündür.</p></div>';
      startBtn.disabled=false;startBtn.textContent='Kodu yoxla və başla';return
    }
    if(await alreadyAttempted(key)){
      startStatus.innerHTML='<div class="attempt-block"><b>Bu şagird sınağı artıq işləyib.</b><p>Təkrar cəhdə icazə verilmir.</p></div>';
      startBtn.disabled=false;startBtn.textContent='Kodu yoxla və başla';return
    }
    studentIdentity={name:student.student_name,key,grade:student.grade||''};
    verifiedStudent.textContent=`${studentIdentity.name}${studentIdentity.grade?' • '+studentIdentity.grade:''}`;
    startPanel.hidden=true;examArea.hidden=false;
    renderQuestions();
    startedAt=Date.now();
    int=setInterval(tick,1000);tick();finishBtn.onclick=finish
  }catch(err){
    startStatus.innerHTML='<p class="save-warn">Kod yoxlanmadı: '+esc(err.message)+'</p>';
    startBtn.disabled=false;startBtn.textContent='Kodu yoxla və başla'
  }
}
startBtn.onclick=startExam;

function onlineStemLines(text){
  const raw=String(text||'').replace(/\r/g,'').trim();
  if(!raw)return [];
  const normalized=raw.replace(/\s+(?=(?:[1-9]|[1-9]\d)[.)]\s+)/g,'\n');
  const lines=normalized.split('\n').map(x=>x.trim()).filter(Boolean);
  const numbered=lines.filter(x=>/^(?:[1-9]|[1-9]\d)[.)]\s+/.test(x)).length;
  return numbered>=2?lines:[raw]
}
function onlineStemMarkup(text){
  const lines=onlineStemLines(text);
  if(lines.length<=1)return `<div class="q-stem">${esc(lines[0]||'')}</div>`;
  return `<div class="q-stem online-numbered-stem">${lines.map(line=>{
    const m=line.match(/^((?:[1-9]|[1-9]\d)[.)])\s*(.*)$/);
    return m
      ? `<div class="online-stem-line"><b>${esc(m[1])}</b><span>${esc(m[2])}</span></div>`
      : `<div class="online-stem-main">${esc(line)}</div>`
  }).join('')}</div>`
}
function renderQuestions(){
  questions.innerHTML=E.questions.map((q,i)=>{
    const p=questionParts(q);
    return `<section class="question-card" id="q${i}"><small>${q.topic||''}</small><div class="q-instruction">${i+1}. ${esc(p.instruction||'Choose the correct variant.')}</div>${p.stem?onlineStemMarkup(p.stem):''}${letters.filter(k=>q[k]&&q[k]!=='—').map(k=>`<label class="option"><input type="radio" name="q${i}" value="${k}"><span class="option-letter">${k}</span><span class="option-text">${esc(q[k])}</span></label>`).join('')}</section>`
  }).join('');
  palette.innerHTML=E.questions.map((_,i)=>`<span id="p${i}">${i+1}</span>`).join('');
  document.querySelectorAll('input[type=radio]').forEach(x=>x.addEventListener('change',()=>{
    const i=x.name.slice(1);document.getElementById('p'+i)?.classList.add('done');update()
  }))
}
function update(){
  const done=document.querySelectorAll('input[type=radio]:checked').length;
  bar.style.width=(done/E.questions.length*100)+'%'
}
function tick(){
  const m=Math.floor(seconds/60),ss=seconds%60;
  timer.textContent=String(m).padStart(2,'0')+':'+String(ss).padStart(2,'0');
  if(seconds--<=0)finish()
}
async function submitResult(payload){
  const cfg=B.supabase||{};
  try{
    const result=await rpc('submit_exam_result',{
      p_owner_id:payload.owner_id,
      p_exam_code:payload.exam_code,
      p_exam_name:payload.exam_name,
      p_student_key:payload.student_key,
      p_score:payload.score,
      p_total:payload.total,
      p_percent:payload.percent,
      p_correct_count:payload.correct_count,
      p_wrong_count:payload.wrong_count,
      p_blank_count:payload.blank_count,
      p_duration_seconds:payload.duration_seconds,
      p_details:payload.details
    });
    return {saved:true,message:'Nəticə müəllim panelinə göndərildi.',id:result}
  }catch(err){
    let msg=String(err.message||err);
    if(/row-level security|RLS/i.test(msg))msg='Supabase SQL yenilənməyib. Parametrlərdən yeni SQL-ni kopyalayıb Run edin.';
    return {saved:false,message:'Nəticə göndərilmədi: '+msg}
  }
}
function performanceText(percent){
  if(percent>=90)return 'Əla nəticə';
  if(percent>=75)return 'Yaxşı nəticə';
  if(percent>=50)return 'Kafi nəticə';
  return 'Təkmilləşdirmə lazımdır'
}
function compactAnswers(details,field){
  return details.map(d=>`<span class="${d.status}"><b>${d.number}</b>${esc(d[field]||'—')}</span>`).join('')
}
function reportCardHTML(data){
  return `<article class="report-card" id="reportCard"><div class="report-watermark">${esc(B.brand)} • ${esc(B.teacher)}</div><header><div class="report-logo">${esc(B.brand)}</div><div><small>RN TEST SİSTEMİ</small><h2>NƏTİCƏ VƏRƏQİ</h2></div></header><div class="report-name">${esc(data.name)}</div><div class="report-exam">${esc(E.name)}${data.grade?' • '+esc(data.grade):''}</div><div class="report-score"><b>${data.percent}%</b><span>${performanceText(data.percent)}</span></div><div class="report-grid"><div><span>Düzgün</span><b>${data.score}</b></div><div><span>Səhv</span><b>${data.wrong}</b></div><div><span>Boş</span><b>${data.blank}</b></div><div><span>Vaxt</span><b>${Math.floor(data.elapsed/60)}:${String(data.elapsed%60).padStart(2,'0')}</b></div></div><div class="answer-sheet"><h3>Şagirdin cavabları</h3><div class="answer-line">${compactAnswers(data.details,'selected')}</div><h3>Cavab açarı</h3><div class="answer-line key-line">${compactAnswers(data.details,'correct')}</div></div><footer><span>Müəllim: <b>${esc(B.teacher)}</b></span><span>${new Date().toLocaleDateString('az-AZ')}</span></footer></article>`
}
function printReportCard(){
  const card=document.getElementById('reportCard');if(!card)return;
  const style=document.querySelector('style')?.textContent||'';
  const w=window.open('','_blank');
  w.document.write(`<!doctype html><html><head><meta charset="utf-8"><title>Nəticə vərəqi</title><style>${style}@page{size:A4;margin:12mm}body{background:#fff}.report-card{box-shadow:none;margin:0}.report-actions,.review-title,.review-card,.save-ok,.save-warn{display:none!important}</style></head><body>${card.outerHTML}<script>onload=()=>setTimeout(()=>print(),300)<\/script></body></html>`);
  w.document.close()
}
window.printRNReportCard=printReportCard;

async function finish(){
  if(finished)return;
  finished=true;if(int)clearInterval(int);finishBtn.disabled=true;
  let score=0,graded=0,blank=0,wrong=0;
  const details=E.questions.map((q,i)=>{
    const selected=document.querySelector(`input[name=q${i}]:checked`)?.value||'';
    const correct=q.answer||'';
    let status='ungraded';
    if(correct){
      graded++;
      if(!selected){blank++;status='blank'}
      else if(selected===correct){score++;status='correct'}
      else{wrong++;status='wrong'}
    }
    const p=questionParts(q);
    return {number:i+1,instruction:p.instruction||'Choose the correct variant.',question:p.stem,selected,correct,status,
      options:Object.fromEntries(letters.filter(k=>q[k]&&q[k]!=='—').map(k=>[k,q[k]]))}
  });
  const percent=graded?Math.round(score/graded*100):0;
  const elapsed=Math.max(0,Math.round((Date.now()-startedAt)/1000));
  const payload={owner_id:B.supabase.ownerId,exam_code:E.shortCode||E.id||'exam',exam_name:E.name,
    student_name:studentIdentity.name,student_key:studentIdentity.key,student_group:studentIdentity.grade||'',score,total:graded,percent,
    correct_count:score,wrong_count:wrong,blank_count:blank,duration_seconds:elapsed,details};
  const saveState=await submitResult(payload);
  if(saveState.saved||oneAttempt)markLocalAttempt(studentIdentity.key);
  const report=reportCardHTML({name:studentIdentity.name,grade:studentIdentity.grade,percent,score,wrong,blank,elapsed,details});
  const review=details.map((d,i)=>{
    const q=E.questions[i],p=questionParts(q);
    const label=d.status==='correct'?'Düzgün':d.status==='wrong'?'Səhv':d.status==='blank'?'Boş':'Yoxlanılmır';
    return `<section class="review-card ${d.status}"><div class="review-head"><b>${d.number}. ${esc(p.instruction||'')}</b><span>${label}</span></div>${p.stem?`<div class="review-stem">${onlineStemMarkup(p.stem)}</div>`:''}<div class="review-answer"><span>Sizin cavabınız: <b>${d.selected||'Boş'}</b></span><span>Düzgün cavab: <b>${d.correct||'—'}</b></span></div>${letters.filter(k=>q[k]&&q[k]!=='—').map(k=>`<div class="review-option ${k===d.correct?'is-correct':''} ${k===d.selected&&k!==d.correct?'is-wrong':''}"><b>${k}</b><span>${esc(q[k])}</span></div>`).join('')}</section>`
  }).join('');
  result.innerHTML=`${report}<div class="report-actions"><button class="finish" onclick="printRNReportCard()">Nəticə vərəqini çap et / PDF saxla</button></div><p class="${saveState.saved?'save-ok':'save-warn'}">${esc(saveState.message)}</p><div class="review-title"><h2>Sualların təhlili</h2></div>${review}`;
  document.querySelectorAll('input[type=radio]').forEach(x=>x.disabled=true);
  result.scrollIntoView({behavior:'smooth'});
}
})(EXAM,BRAND);</script></body></html>
