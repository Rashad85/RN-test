  return `<article class="report-card" id="reportCard"><div class="report-watermark">${esc(B.brand)} • ${esc(B.teacher)}</div><header><div class="report-logo">${esc(B.brand)}</div><div><small>RN TEST SİSTEMİ</small><h2>NƏTİCƏ KARNESİ</h2></div></header><div class="report-name">${esc(data.name)}</div><div class="report-exam">${esc(E.name)}</div><div class="report-score"><b>${data.percent}%</b><span>${performanceText(data.percent)}</span></div><div class="report-grid"><div><span>Düzgün</span><b>${data.score}</b></div><div><span>Səhv</span><b>${data.wrong}</b></div><div><span>Boş</span><b>${data.blank}</b></div><div><span>Vaxt</span><b>${Math.floor(data.elapsed/60)}:${String(data.elapsed%60).padStart(2,'0')}</b></div></div><footer><span>Müəllim: <b>${esc(B.teacher)}</b></span><span>${new Date().toLocaleDateString('az-AZ')}</span></footer></article>`
}
function printReportCard(){
  const card=document.getElementById('reportCard');
  if(!card)return;
  const w=window.open('','_blank');
  w.document.write(`<!doctype html><html><head><meta charset="utf-8"><title>Nəticə karnesi</title><style>@page{size:A4;margin:15mm}body{font-family:Arial;margin:0;color:#172033}.report-card{position:relative;border:3px solid #74182d;border-radius:22px;padding:28px;overflow:hidden}.report-watermark{position:absolute;inset:0;display:grid;place-items:center;transform:rotate(-25deg);font-size:55px;font-weight:900;color:#74182d0b;z-index:0}.report-card>*:not(.report-watermark){position:relative;z-index:1}.report-card header{display:flex;align-items:center;gap:15px;border-bottom:3px solid #74182d;padding-bottom:14px}.report-logo{width:58px;height:58px;border-radius:16px;background:#74182d;color:#fff;display:grid;place-items:center;font-weight:900;font-size:22px}.report-card small{color:#74182d;font-weight:800;letter-spacing:1px}.report-card h2{margin:4px 0}.report-name{text-align:center;font-size:28px;font-weight:800;margin-top:28px}.report-exam{text-align:center;color:#657083;margin-top:6px}.report-score{text-align:center;margin:25px 0}.report-score b{display:block;font-size:68px;color:#74182d}.report-score span{font-size:20px;font-weight:700}.report-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}.report-grid div{background:#f5f6f8;border-radius:14px;padding:16px;text-align:center}.report-grid span{display:block;color:#697282}.report-grid b{font-size:25px}.report-card footer{display:flex;justify-content:space-between;border-top:1px solid #ccd1d8;margin-top:28px;padding-top:14px}@media print{button{display:none}}</style></head><body>${card.outerHTML}<script>onload=()=>setTimeout(()=>print(),300)<\/script></body></html>`);
  w.document.close()
}
window.printRNReportCard=printReportCard;

async function finish(){
  if(finished)return;
  finished=true;if(int)clearInterval(int);finishBtn.disabled=true;
  let score=0,graded=0,blank=0,wrong=0;
  const details=E.questions.map((q,i)=>{
    const selected=document.querySelector(`input[name=q${i}]:checked`)?.value||'';
    const correct=q.answer||'';
    let status='ungraded';
    if(correct){
      graded++;
      if(!selected){blank++;status='blank'}
      else if(selected===correct){score++;status='correct'}
      else{wrong++;status='wrong'}
    }
    const p=questionParts(q);
    return {number:i+1,instruction:p.instruction,question:p.stem,selected,correct,status,
      options:Object.fromEntries(letters.filter(k=>q[k]&&q[k]!=='—').map(k=>[k,q[k]]))}
  });
  const percent=graded?Math.round(score/graded*100):0;
  const elapsed=Math.max(0,Math.round((Date.now()-startedAt)/1000));
  const payload={
    owner_id:B.supabase?.ownerId||'',
    exam_code:E.shortCode||E.id||'exam',
    exam_name:E.name,
    student_name:studentIdentity.name,
    student_key:studentIdentity.key,
    score,total:graded,percent,correct_count:score,wrong_count:wrong,blank_count:blank,
    duration_seconds:elapsed,details
  };
  const saveState=await submitResult(payload);
  if(saveState.saved||oneAttempt)markLocalAttempt(studentIdentity.key);
  const report=reportCardHTML({name:studentIdentity.name,percent,score,wrong,blank,elapsed});
  const review=details.map((d,i)=>{
    const q=E.questions[i],p=questionParts(q);
    const label=d.status==='correct'?'Düzgün':d.status==='wrong'?'Səhv':d.status==='blank'?'Boş':'Yoxlanılmır';
    return `<section class="review-card ${d.status}"><div class="review-head"><b>${d.number}. ${esc(p.instruction||'')}</b><span>${label}</span></div>${p.stem?`<div class="review-stem">${esc(p.stem)}</div>`:''}<div class="review-answer"><span>Sizin cavabınız: <b>${d.selected||'Boş'}</b></span><span>Düzgün cavab: <b>${d.correct||'—'}</b></span></div>${letters.filter(k=>q[k]&&q[k]!=='—').map(k=>`<div class="review-option ${k===d.correct?'is-correct':''} ${k===d.selected&&k!==d.correct?'is-wrong':''}"><b>${k}</b><span>${esc(q[k])}</span></div>`).join('')}</section>`
  }).join('');
  result.innerHTML=`${report}<div class="report-actions"><button class="finish" onclick="printRNReportCard()">Karne-ni çap et / PDF saxla</button><button class="secondary-report" onclick="location.reload()">Səhifəni yenilə</button></div><p class="${saveState.saved?'save-ok':'save-warn'}">${esc(saveState.message)}</p><div class="review-title"><h2>Sualların təhlili</h2><p>Düzgün, səhv və boş buraxılan cavablar</p></div>${review}`;
  document.querySelectorAll('input[type=radio]').forEach(x=>x.disabled=true);
  result.scrollIntoView({behavior:'smooth'});
  localStorage.setItem('rn_result_'+Date.now(),JSON.stringify(payload))
}
})(EXAM,BRAND);</script></body></html>
