function esc(v){return String(v??'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}[m]))}
function questionParts(q){
  let t=String(q.text||'').replace(/\s+/g,' ').trim();
  const starts=/^(Choose|Select|Find|Complete|Change|Fill|Pick|Match|Identify|Read|Mark|Use|Write|Rewrite|Put|Decide|Which|Make|Correct|Open|Listen)\b/i;
  if(!starts.test(t))return{instruction:'',stem:t};
  const stop=t.search(/[.?](?:\s|$)/);
  if(stop>=0){
    const instruction=t.slice(0,stop+1).trim();
    const stem=t.slice(stop+1).trim();

  }
